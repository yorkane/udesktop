services:
  midscene-pc:
    build:
      context: .
      dockerfile: Dockerfile
    image: midpc
    container_name: midpc
    devices:
      - /dev/fuse:/dev/fuse
    ports:
      - "4000:4000"
      - "5000:5000"
      - "10022:22"
      - "3333:3333"
    environment:
      - REMOTE_DESKTOP=${REMOTE_DESKTOP}
      - USER=${USER}
      - PASSWORD=${PASSWORD}
      - VNC_RESOLUTION=${VNC_RESOLUTION}
      - DISABLE_HTTPS=${DISABLE_HTTPS}
      - CHROME_AUTO_START=${CHROME_AUTO_START}
      - CHROME_URL=${CHROME_URL}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - CHROME_PROXY_SERVER=${CHROME_PROXY_SERVER:-}
      - CHROME_NO_PROXY=${CHROME_NO_PROXY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
    privileged: true
    shm_size: 4g
    volumes:
      - /onas/share1:/onas/share3
      - /onas/share2:/onas/share3
      - /onas/share3:/onas/share3
      - /mnt/s3:/s3
      - ./data/Downloads:/home/ubuntu/Downloads
    cgroup: host
    restart: unless-stopped
    tty: true
