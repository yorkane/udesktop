services:
  midscene-pc:
    image: ghcr.io/yorkane/midpc
    container_name: midpc
    devices:
      - /dev/fuse:/dev/fuse
    ports:
      - "4000:4000"
      # - "5000:5000"
      # - "10022:22"
      - "3767:3767"
      - "3768:3768"
      - "9223:9223"
    environment:
      - REMOTE_DESKTOP=${REMOTE_DESKTOP}
      - USER=${USER}
      - PASSWORD=${PASSWORD}
      - VNC_RESOLUTION=${VNC_RESOLUTION}
      - DISABLE_HTTPS=${DISABLE_HTTPS:-1}
      - CHROME_AUTO_START=${CHROME_AUTO_START}
      - CHROME_URL=${CHROME_URL}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - CHROME_PROXY_SERVER=${CHROME_PROXY_SERVER:-}
      - CHROME_NO_PROXY=${CHROME_NO_PROXY:-}
      - ENABLE_CODE_SERVER=${ENABLE_CODE_SERVER:-0}
      - ENABLE_SSH=${ENABLE_SSH:-0}
      - MIDSCENE_RELAY_AUTO_START=${MIDSCENE_RELAY_AUTO_START:-1}
      - ENABLE_WEB_RELAY=${ENABLE_WEB_RELAY:-true}
      - ENABLE_CDP_PROXY=${ENABLE_CDP_PROXY:-true}
      - RELAY_URL=${RELAY_URL:-ws://0.0.0.0:3768}
      - COMPUTER_RELAY_URL=ws://0.0.0.0:3767
      - ENABLE_COMPUTER_RELAY=${ENABLE_COMPUTER_RELAY:-true}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
    privileged: true
    shm_size: 4g
    volumes:
      - /onas/share1:/onas/share3
      - /onas/share2:/onas/share3
      - /onas/share3:/onas/share3
      - /mnt/s3:/s3
      - ./data/Downloads:/home/ubuntu/Downloads
    cgroup: host
    restart: unless-stopped
    tty: true
